<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            width: 250px;
            background: white;
            color: #333;
        }

        h3 {
            margin: 0 0 16px 0;
            font-size: 16px;
        }

        .info {
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.4;
            color: #555;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            background-color: #f1f1f1;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
            color: #333;
        }

        button:hover {
            background-color: #e2e2e2;
        }

        button.primary {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        button.primary:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <h3>peekPeak</h3>

    <div class="info">
        Highlight text on any page and press <strong>Alt+A</strong> (Windows) or <strong>Option+A</strong> (Mac) to get
        a quick explanation.
    </div>

    <div class="button-container">
        <button id="openSettingsBtn" class="primary">Open Settings</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
