<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Quick Explain Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <h2>AI Quick Explain Settings</h2>
    
    <div class="form-group">
      <label for="apiKey">Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your Gemini API key...">
      <div class="hint">Get your key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.</div>
    </div>

    <div class="form-group">
      <label for="systemPrompt">System Prompt</label>
      <textarea id="systemPrompt" rows="4" placeholder="Briefly explain the highlighted text."></textarea>
      <div class="hint">Instruction on how the AI should respond.</div>
    </div>

    <div class="form-group">
      <label for="modelSelection">Model Selection</label>
      <select id="modelSelection">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash (Fast)</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro (Powerful)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="responseLength">Response Length</label>
      <select id="responseLength">
        <option value="short">Short (1-2 sentences)</option>
        <option value="medium" selected>Medium</option>
        <option value="detailed">Detailed</option>
      </select>
    </div>

    <div class="form-group">
      <button id="saveBtn">Save Settings</button>
      <span id="statusMessage" class="status-msg hidden">Saved!</span>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
